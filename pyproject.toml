# Python test/quality config for the stx-v3 client layer (stxc/ cli/ tui/).
# The daemon itself is Kotlin/Gradle; this file only configures pytest + coverage.
# These packages are flat at the repo root and run via PYTHONPATH (see bin/stx), so
# pytest adds the repo root to sys.path via `pythonpath` rather than installing a package.

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
# Coverage is opt-in (needs pytest-cov): `python -m pytest --cov=stxc --cov=cli tests/`.

[tool.coverage.run]
source = ["stxc", "cli"]
branch = true

[tool.coverage.report]
show_missing = true
skip_empty = true
