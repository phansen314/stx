name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kotlin:
    name: Kotlin daemon (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  python:
    name: Python clients (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt -r tui/requirements.txt -r scripts/requirements.txt
      - run: python -m pytest tests/ -q
